<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coupe du Monde 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap');
:root{--ink:#0a0f1a;--paper:#f5f2ed;--pitch:#1b4332;--gold:#d4a017;--chalk:#ffffff;--line:#ddd8cf;--muted:#7a7265;--france-bg:#eef2ff;--france:#002395;--q1-bg:#d0f0e0;--q1:#1b4332;--q2-bg:#e8f6ee;--q2:#2d6a4f;--danger:#b91c1c;--row-alt:#ede9e1;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Inter',sans-serif;background:var(--paper);color:var(--ink);font-size:14px;line-height:1.4;}
#hdr{background:var(--ink);display:flex;align-items:stretch;padding:0 20px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.4);}
.brand{display:flex;align-items:center;gap:10px;padding:12px 20px 12px 0;border-right:1px solid rgba(255,255,255,.1);margin-right:16px;}
.bt1{font-family:'Oswald',sans-serif;font-weight:700;font-size:16px;color:#fff;letter-spacing:.5px;text-transform:uppercase;}
.bt2{font-family:'Oswald',sans-serif;font-size:10px;color:var(--gold);letter-spacing:1px;text-transform:uppercase;}
nav{display:flex;align-items:stretch;}
.tab{font-family:'Oswald',sans-serif;font-weight:500;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.45);padding:0 16px;border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;transition:.15s;white-space:nowrap;}
.tab:hover{color:rgba(255,255,255,.8);}
.tab.on{color:#fff;border-bottom-color:var(--gold);}
.hright{margin-left:auto;display:flex;align-items:center;gap:6px;}
.btn{font-family:'Oswald',sans-serif;font-weight:600;font-size:11px;letter-spacing:.8px;text-transform:uppercase;padding:6px 12px;border-radius:2px;cursor:pointer;border:none;transition:.15s;}
.btn-g{background:var(--gold);color:var(--ink);}
.btn-g:hover{background:#b8891a;}
.btn-o{background:transparent;color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.2);}
.btn-o:hover{color:#fff;border-color:rgba(255,255,255,.5);}
#sync-bar{display:flex;align-items:center;gap:8px;padding:7px 20px;font-size:11px;font-family:'Oswald',sans-serif;letter-spacing:.5px;background:#1a2535;color:rgba(255,255,255,.5);border-bottom:1px solid rgba(255,255,255,.08);}
#sync-dot{width:8px;height:8px;border-radius:50%;background:#666;flex-shrink:0;transition:background .3s;}
#sync-dot.ok{background:#22c55e;}
#sync-dot.saving{background:var(--gold);animation:pulse .8s infinite;}
#sync-dot.err{background:var(--danger);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.view{display:none;padding:20px;max-width:1200px;margin:0 auto;padding-bottom:60px;}
.view.on{display:block;}
.sec-hd{font-family:'Oswald',sans-serif;font-weight:700;font-size:17px;letter-spacing:2px;text-transform:uppercase;color:#fff;background:var(--ink);padding:9px 16px;margin:24px 0 8px;display:flex;align-items:center;gap:10px;}
.sec-hd .acc{display:inline-block;width:4px;height:20px;background:var(--gold);}
.day-lbl{font-family:'Oswald',sans-serif;font-weight:600;font-size:11px;letter-spacing:1px;color:var(--pitch);text-transform:uppercase;margin:10px 0 3px;display:flex;align-items:center;gap:8px;}
.day-lbl::after{content:'';flex:1;height:1px;background:var(--line);}
.tbl{width:100%;border-collapse:collapse;margin-bottom:2px;}
.tbl thead tr{background:#1e2840;}
.tbl thead th{font-family:'Oswald',sans-serif;font-size:10px;font-weight:600;letter-spacing:1px;color:rgba(255,255,255,.55);text-transform:uppercase;padding:5px 8px;text-align:center;}
.tbl thead th.lft{text-align:left;padding-left:10px;}
.tbl tbody tr{border-bottom:1px solid var(--line);}
.tbl tbody tr:nth-child(odd){background:var(--chalk);}
.tbl tbody tr:nth-child(even){background:var(--row-alt);}
.tbl tbody tr.fr td.nc{background:var(--france-bg)!important;color:var(--france);font-weight:600;}
.tbl td{padding:5px 8px;text-align:center;vertical-align:middle;font-size:12px;}
.tbl td.nc{text-align:left;padding-left:10px;font-size:12px;min-width:100px;}
.tbl td.vc{text-align:left;font-size:10px;color:var(--muted);}
.tbl td.gc{font-family:'Oswald',sans-serif;font-weight:700;font-size:12px;color:var(--muted);}
.ssep{font-weight:700;color:var(--muted);font-size:13px;}
input[type=number].si,input[type=text].ti,input[type=text].qi{height:25px;border:1.5px solid var(--line);border-radius:1px;font-family:'Oswald',sans-serif;color:var(--ink);background:var(--chalk);outline:none;transition:border-color .12s,background .12s;}
input[type=number].si{width:34px;text-align:center;font-size:14px;font-weight:700;}
input[type=text].ti{width:115px;padding:0 5px;font-size:11px;}
input[type=text].qi{width:105px;padding:0 5px;font-size:11px;}
input.si:focus,input.ti:focus{border-color:var(--pitch);}
input.qi:focus{border-color:var(--danger);}
input.si.has{border-color:var(--gold);background:#fdf8ec;}
input.ti.has{border-color:var(--pitch);background:#edf7f1;}
input.qi.has{border-color:var(--danger);background:#fdf0f0;}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(410px,1fr));gap:14px;margin-top:10px;}
.sc{background:var(--chalk);border:1px solid var(--line);overflow:hidden;}
.schd{background:var(--ink);padding:8px 14px;display:flex;align-items:baseline;gap:10px;}
.sgl{font-family:'Oswald',sans-serif;font-weight:700;font-size:15px;letter-spacing:1px;color:var(--gold);text-transform:uppercase;}
.stms{font-size:10px;color:rgba(255,255,255,.4);font-family:'Oswald',sans-serif;}
.st{width:100%;border-collapse:collapse;}
.st thead tr{background:#1e2840;}
.st thead th{font-family:'Oswald',sans-serif;font-size:10px;font-weight:600;letter-spacing:.8px;color:rgba(255,255,255,.55);text-transform:uppercase;padding:5px 5px;text-align:center;}
.st thead th.stt{text-align:left;padding-left:10px;min-width:110px;}
.st tbody tr{border-bottom:1px solid var(--line);}
.st tbody tr:last-child{border-bottom:none;}
.st td{padding:6px 5px;text-align:center;font-size:12px;}
.st td.rk{width:22px;padding-left:8px;font-family:'Oswald',sans-serif;font-weight:700;font-size:13px;color:var(--muted);}
.st td.rk.r1{color:var(--q1);}
.st td.rk.r2{color:var(--q2);}
.st td.tn{text-align:left;padding-left:6px;font-size:12px;font-weight:500;}
.st td.pts{font-family:'Oswald',sans-serif;font-weight:700;font-size:15px;color:var(--ink);padding-right:8px;}
.st td.df{font-weight:600;}
.st td.df.p{color:var(--pitch);}
.st td.df.n{color:var(--danger);}
.st tbody tr.q1{background:var(--q1-bg);}
.st tbody tr.q2{background:var(--q2-bg);}
.qdot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;vertical-align:middle;}
.qdot.d1{background:var(--q1);}
.qdot.d2{background:var(--q2);}
.leg{display:flex;flex-wrap:wrap;gap:14px;margin-top:14px;padding:10px 14px;background:var(--chalk);border:1px solid var(--line);font-size:11px;color:var(--muted);}
.leg span{display:flex;align-items:center;gap:5px;}
.lsw{display:inline-block;width:13px;height:10px;border-radius:1px;}
footer{text-align:center;padding:14px;font-size:11px;color:var(--muted);border-top:1px solid var(--line);background:var(--chalk);margin-top:40px;}
@media(max-width:700px){
  #hdr{padding:0 10px;flex-wrap:wrap;}
  .brand{border-right:none;padding-right:0;}
  nav{width:100%;overflow-x:auto;border-top:1px solid rgba(255,255,255,.08);}
  .tab{padding:0 12px;font-size:11px;}
  .view{padding:12px;}
  .sg{grid-template-columns:1fr;}
  input[type=text].ti,input[type=text].qi{width:80px;}
}
</style>
</head>

'02:00',t1:'Vainqueur 1/16 #9',t2:'Vainqueur 1/16 #10',s:'NRG Stadium, Houston'},{h:'22:00',t1:'Vainqueur 1/16 #11',t2:'Vainqueur 1/16 #12',s:'Mercedes-Benz Stadium, Atlanta'}]},{day:'Ven. 10 juillet',m:[{h:'02:00',t1:'Vainqueur 1/16 #13',t2:'Vainqueur 1/16 #14',s:'Gillette Stadium, Boston'},{h:'22:00',t1:'Vainqueur 1/16 #15',t2:'Vainqueur 1/16 #16',s:'Arrowhead Stadium, Kansas City'}]}]},{title:'DEMI-FINALES',days:[{day:'Mar. 14 juillet',m:[{h:'02:00',t1:'Vainqueur QF1',t2:'Vainqueur QF2',s:'MetLife Stadium, East Rutherford'}]},{day:'Mer. 15 juillet',m:[{h:'02:00',t1:'Vainqueur QF3',t2:'Vainqueur QF4',s:'AT&T Stadium, Arlington'}]},{day:'Jeu. 16 juillet',m:[{h:'02:00',t1:'Vainqueur QF5',t2:'Vainqueur QF6',s:'SoFi Stadium, Los Angeles'}]},{day:'Ven. 17 juillet',m:[{h:'02:00',t1:'Vainqueur QF7',t2:'Vainqueur QF8',s:'Hard Rock Stadium, Miami'}]}]},{title:'PETITE FINALE & FINALE',days:[{day:'Sam. 18 juillet — 3e place',m:[{h:'02:00',t1:'Perdant SF1',t2:'Perdant SF2',s:'Hard Rock Stadium, Miami'}]},{day:'Dim. 19 juillet 🏆 FINALE',m:[{h:'21:00',t1:'Vainqueur SF1',t2:'Vainqueur SF2',s:'MetLife Stadium, East Rutherford'}]}]}];
const GMR={};
GDAYS.forEach(d=>d.m.forEach(m=>{(GMR[m.g]||(GMR[m.g]=[])).push(m);}));
function gk(g,i){return `g${g}_${i}`;}
function kk(si,di,mi){return `k${si}_${di}_${mi}`;}
let db,dbRef,S={},saveTimer;
function setSyncStatus(s,m){document.getElementById('sync-dot').className=s;document.getElementById('sync-txt').textContent=m;}
const app=initializeApp(firebaseConfig);
db=getDatabase(app);
dbRef=ref(db,'scores');
onValue(dbRef,(snap)=>{S=snap.val()||{};setSyncStatus('ok','✓ Synchronisé — scores partagés en temps réel');updateAllInputs();},(e)=>{setSyncStatus('err','✗ Erreur : '+e.message);});
function scheduleSave(){setSyncStatus('saving','⟳ Sauvegarde…');clearTimeout(saveTimer);saveTimer=setTimeout(async()=>{try{await update(dbRef,S);setSyncStatus('ok','✓ Synchronisé — scores partagés en temps réel');}catch(e){setSyncStatus('err','✗ Erreur de sauvegarde');}},600);}
window.upG=function(g,idx,side,el){const key=gk(g,idx);if(!S[key])S[key]={s1:'',s2:''};side===0?S[key].s1=el.value:S[key].s2=el.value;el.classList.toggle('has',el.value!=='');scheduleSave();};
window.upK=function(si,di,mi,field,el){const key=kk(si,di,mi);if(!S[key])S[key]={t1:'',t2:'',s1:'',s2:'',q:''};S[key][field]=el.value;el.classList.toggle('has',el.value!=='');scheduleSave();};
window.resetAll=async function(){if(!confirm('Effacer tous les scores pour tout le monde ?'))return;S={};try{await remove(dbRef);setSyncStatus('ok','✓ Réinitialisé');renderCal();}catch(e){setSyncStatus('err','✗ Erreur');}};
function sh(t){return `<div class="sec-hd"><span class="acc"></span>${t}</div>`;}
function dl(d){return `<div class="day-lbl">${d}</div>`;}
function renderCal(){let h='';h+=sh('Phase de Groupes');GDAYS.forEach(day=>{h+=dl(day.day);h+=`<table class="tbl"><thead><tr><th style="width:50px">Heure</th><th class="lft">Équipe 1</th><th style="width:36px">B1</th><th style="width:14px"></th><th style="width:36px">B2</th><th class="lft">Équipe 2</th><th class="lft">Stade</th><th style="width:26px">Gr.</th></tr></thead><tbody>`;day.m.forEach(m=>{const idx=GMR[m.g].indexOf(m),key=gk(m.g,idx),sc=S[key]||{s1:'',s2:''};const fr=m.fr?'fr':'';h+=`<tr class="${fr}"><td>${m.h}</td><td class="nc">${m.t1}</td><td><input class="si${sc.s1!==''?' has':''}" type="number" min="0" max="30" value="${sc.s1}" placeholder="–" data-gk="${key}" data-side="0" oninput="upG('${m.g}',${idx},0,this)"></td><td><span class="ssep">:</span></td><td><input class="si${sc.s2!==''?' has':''}" type="number" min="0" max="30" value="${sc.s2}" placeholder="–" data-gk="${key}" data-side="1" oninput="upG('${m.g}',${idx},1,this)"></td><td class="nc">${m.t2}</td><td class="vc">${m.s}</td><td class="gc">${m.g}</td></tr>`;});h+=`</tbody></table>`;});KO.forEach((sec,si)=>{h+=sh(sec.title);sec.days.forEach((day,di)=>{h+=dl(day.day);h+=`<table class="tbl"><thead><tr><th style="width:50px">Heure</th><th class="lft">Équipe 1</th><th style="width:36px">B1</th><th style="width:14px"></th><th style="width:36px">B2</th><th class="lft">Équipe 2</th><th class="lft">Stade</th><th class="lft" style="min-width:100px">Qualifié ➜</th></tr></thead><tbody>`;day.m.forEach((m,mi)=>{const key=kk(si,di,mi),sc=S[key]||{t1:'',t2:'',s1:'',s2:'',q:''};h+=`<tr><td>${m.h}</td><td><input class="ti${sc.t1?' has':''}" type="text" value="${sc.t1||m.t1}" data-kk="${key}" data-f="t1" oninput="upK(${si},${di},${mi},'t1',this)"></td><td><input class="si${sc.s1!==''?' has':''}" type="number" min="0" max="30" value="${sc.s1}" placeholder="–" oninput="upK(${si},${di},${mi},'s1',this)"></td><td><span class="ssep">:</span></td><td><input class="si${sc.s2!==''?' has':''}" type="number" min="0" max="30" value="${sc.s2}" placeholder="–" oninput="upK(${si},${di},${mi},'s2',this)"></td><td><input class="ti${sc.t2?' has':''}" type="text" value="${sc.t2||m.t2}" data-kk="${key}" data-f="t2" oninput="upK(${si},${di},${mi},'t2',this)"></td><td class="vc">${m.s}</td><td><input class="qi${sc.q?' has':''}" type="text" value="${sc.q}" placeholder="–" oninput="upK(${si},${di},${mi},'q',this)"></td></tr>`;});h+=`</tbody></table>`;});});h+=`<div class="leg"><span><span class="lsw" style="background:#eef2ff;border:1px solid #c7d2fe"></span>Match France</span><span><span class="lsw" style="background:#fdf8ec;border:1px solid #d4a017"></span>Score saisi</span><span><span class="lsw" style="background:#edf7f1;border:1px solid #2d6a4f"></span>Équipe saisie</span><span><span class="lsw" style="background:#fdf0f0;border:1px solid #b91c1c"></span>Qualifié saisi</span><span>Horaires heure de Paris (CEST)</span></div>`;document.getElementById('v-cal').innerHTML=h;}
function updateAllInputs(){GDAYS.forEach(day=>day.m.forEach(m=>{const idx=GMR[m.g].indexOf(m),key=gk(m.g,idx),sc=S[key]||{s1:'',s2:''};document.querySelectorAll(`[data-gk="${key}"]`).forEach(el=>{const val=el.dataset.side==='0'?sc.s1:sc.s2;if(document.activeElement!==el){el.value=val;el.classList.toggle('has',val!=='');}});}));KO.forEach((sec,si)=>sec.days.forEach((day,di)=>day.m.forEach((m,mi)=>{const key=kk(si,di,mi),sc=S[key]||{};document.querySelectorAll(`[data-kk="${key}"]`).forEach(el=>{const val=sc[el.dataset.f]||'';if(document.activeElement!==el){el.value=val||m[el.dataset.f]||'';el.classList.toggle('has',!!sc[el.dataset.f]);}});})));if(document.getElementById('v-std').classList.contains('on'))renderStd();}
function computeGrp(gid){const st={};GRP[gid].forEach(t=>st[t]={j:0,v:0,n:0,d:0,gf:0,ga:0,pts:0});(GMR[gid]||[]).forEach((m,mi)=>{const sc=S[gk(gid,mi)];if(!sc||sc.s1===''||sc.s2==='')return;const g1=parseInt(sc.s1),g2=parseInt(sc.s2);if(isNaN(g1)||isNaN(g2))return;const find=n=>st[n]!==undefined?n:Object.keys(st).find(k=>k.toLowerCase()===n.toLowerCase());const k1=find(m.t1),k2=find(m.t2);if(!k1||!k2)return;st[k1].j++;st[k1].gf+=g1;st[k1].ga+=g2;st[k2].j++;st[k2].gf+=g2;st[k2].ga+=g1;if(g1>g2){st[k1].v++;st[k1].pts+=3;st[k2].d++;}else if(g1<g2){st[k2].v++;st[k2].pts+=3;st[k1].d++;}else{st[k1].n++;st[k1].pts++;st[k2].n++;st[k2].pts++;}});return Object.entries(st).map(([name,s])=>({name,...s,diff:s.gf-s.ga})).sort((a,b)=>b.pts-a.pts||b.diff-a.diff||b.gf-a.gf||a.name.localeCompare(b.name));}
function renderStd(){let h=`<div class="sg">`;Object.keys(GRP).forEach(gid=>{const rows=computeGrp(gid);h+=`<div class="sc"><div class="schd"><span class="sgl">Groupe ${gid}</span><span class="stms">${GRP[gid].join(' · ')}</span></div><table class="st"><thead><tr><th></th><th class="stt">Équipe</th><th>J</th><th>V</th><th>N</th><th>D</th><th>+</th><th>−</th><th>Diff</th><th>PTS</th></tr></thead><tbody>`;rows.forEach((r,i)=>{const qc=i===0?'q1':i===1?'q2':'';const rc=i===0?'r1':i===1?'r2':'';const badge=i===0?'<span class="qdot d1"></span>':i===1?'<span class="qdot d2"></span>':'';const dc=r.diff>0?'p':r.diff<0?'n':'';const ds=r.j>0?(r.diff>0?`+${r.diff}`:`${r.diff}`):'—';h+=`<tr class="${qc}"><td class="rk ${rc}">${i+1}</td><td class="tn">${badge}${r.name}</td><td>${r.j}</td><td>${r.v}</td><td>${r.n}</td><td>${r.d}</td><td>${r.gf}</td><td>${r.ga}</td><td class="df ${dc}">${ds}</td><td class="pts">${r.pts}</td></tr>`;});h+=`</tbody></table></div>`;});h+=`</div><div class="leg" style="margin-top:14px"><span><span class="qdot d1"></span>1er qualifié</span><span><span class="qdot d2"></span>2e qualifié</span><span>Départage : points → diff. buts → buts marqués</span></div>`;document.getElementById('v-std').innerHTML=h;}
window.show=function(name,btn){document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));document.getElementById('v-'+name).classList.add('on');btn.classList.add('on');if(name==='std')renderStd();};
renderCal();
</script>
