<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coupe du Monde 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap');
:root{--ink:#0a0f1a;--paper:#0f1923;--pitch:#1b4332;--gold:#d4a017;--chalk:#1a2535;--line:#2a3a4a;--muted:#8a9ab5;--france-bg:#eef2ff;--france:#002395;--q1-bg:#d0f0e0;--q1:#1b4332;--q2-bg:#e8f6ee;--q2:#2d6a4f;--danger:#b91c1c;--row-alt:#16222f;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Inter',sans-serif;background:var(--paper);color:#e8edf5;font-size:14px;line-height:1.4;}

/* HEADER */
#hdr{background:var(–ink);display:flex;align-items:stretch;padding:0 20px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.4);}
.brand{display:flex;align-items:center;padding:12px 20px 12px 0;border-right:1px solid rgba(255,255,255,.1);margin-right:16px;}
.bt1{font-family:‘Oswald’,sans-serif;font-weight:700;font-size:16px;color:#fff;letter-spacing:.5px;text-transform:uppercase;}
.bt2{font-family:‘Oswald’,sans-serif;font-size:10px;color:var(–gold);letter-spacing:1px;text-transform:uppercase;}
nav{display:flex;align-items:stretch;}
.tab{font-family:‘Oswald’,sans-serif;font-weight:500;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.45);padding:0 14px;border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;transition:.15s;white-space:nowrap;}
.tab:hover{color:rgba(255,255,255,.8);}
.tab.on{color:#fff;border-bottom-color:var(–gold);}
.hright{margin-left:auto;display:flex;align-items:center;gap:6px;}
.btn{font-family:‘Oswald’,sans-serif;font-weight:600;font-size:11px;letter-spacing:.8px;text-transform:uppercase;padding:6px 12px;border-radius:2px;cursor:pointer;border:none;transition:.15s;}
.btn-g{background:var(–gold);color:var(–ink);}
.btn-g:hover{background:#b8891a;}
.btn-o{background:transparent;color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.2);}
.btn-o:hover{color:#fff;border-color:rgba(255,255,255,.5);}
.btn-red{background:var(–danger);color:#fff;}
.btn-red:hover{background:#991b1b;}

/* SYNC */
#sync-bar{display:flex;align-items:center;gap:8px;padding:7px 20px;font-size:11px;font-family:‘Oswald’,sans-serif;letter-spacing:.5px;background:#1a2535;color:rgba(255,255,255,.5);border-bottom:1px solid rgba(255,255,255,.08);}
#sync-dot{width:8px;height:8px;border-radius:50%;background:#666;flex-shrink:0;transition:background .3s;}
#sync-dot.ok{background:#22c55e;}
#sync-dot.saving{background:var(–gold);animation:pulse .8s infinite;}
#sync-dot.err{background:var(–danger);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

/* VIEWS */
.view{display:none;padding:20px;max-width:1200px;margin:0 auto;padding-bottom:60px;}
.view.on{display:block;}
.sec-hd{font-family:‘Oswald’,sans-serif;font-weight:700;font-size:17px;letter-spacing:2px;text-transform:uppercase;color:#fff;background:#0a0f1a;padding:9px 16px;margin:24px 0 8px;display:flex;align-items:center;gap:10px;}
.sec-hd .acc{display:inline-block;width:4px;height:20px;background:var(–gold);}
.day-lbl{font-family:‘Oswald’,sans-serif;font-weight:600;font-size:11px;letter-spacing:1px;color:var(–pitch);text-transform:uppercase;margin:10px 0 3px;display:flex;align-items:center;gap:8px;}
.day-lbl::after{content:’’;flex:1;height:1px;background:var(–line);}

/* TABLES */
.tbl{width:100%;border-collapse:collapse;margin-bottom:2px;}
.tbl thead tr{background:#0a1628;}
.tbl thead th{font-family:‘Oswald’,sans-serif;font-size:10px;font-weight:600;letter-spacing:1px;color:rgba(255,255,255,.55);text-transform:uppercase;padding:5px 8px;text-align:center;}
.tbl thead th.lft{text-align:left;padding-left:10px;}
.tbl tbody tr{border-bottom:1px solid var(–line);}
.tbl tbody tr:nth-child(odd){background:var(–chalk);}
.tbl tbody tr:nth-child(even){background:var(–row-alt);}
.tbl tbody tr.fr td.nc{background:var(–france-bg)!important;color:var(–france);font-weight:600;}
.tbl td{padding:5px 8px;text-align:center;vertical-align:middle;font-size:12px;}
.tbl td.nc{text-align:left;padding-left:10px;font-size:12px;min-width:100px;}
.tbl td.vc{text-align:left;font-size:10px;color:var(–muted);}
.tbl td.gc{font-family:‘Oswald’,sans-serif;font-weight:700;font-size:12px;color:var(–muted);}
.ssep{font-weight:700;color:var(–muted);font-size:13px;}

/* INPUTS */
input[type=number].si,input[type=text].ti,input[type=text].qi{height:25px;border:1.5px solid #1e3048;border-radius:1px;font-family:‘Oswald’,sans-serif;color:#c8d6e8;background:#0d1520;outline:none;transition:border-color .12s,background .12s;}
input[type=number].si{width:34px;text-align:center;font-size:14px;font-weight:700;}
input[type=text].ti{width:115px;padding:0 5px;font-size:11px;}
input[type=text].qi{width:105px;padding:0 5px;font-size:11px;}
input.si:focus,input.ti:focus{border-color:var(–pitch);}
input.qi:focus{border-color:var(–danger);}
input.si.has{border-color:var(–gold);background:#fdf8ec;}
input.ti.has{border-color:var(–pitch);background:#edf7f1;}
input.qi.has{border-color:var(–danger);background:#fdf0f0;}

/* STANDINGS */
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(410px,1fr));gap:14px;margin-top:10px;}
.sc{background:#162030;border:1px solid #1e3048;overflow:hidden;}
.schd{background:#0a0f1a;padding:8px 14px;display:flex;align-items:baseline;gap:10px;}
.sgl{font-family:‘Oswald’,sans-serif;font-weight:700;font-size:15px;letter-spacing:1px;color:var(–gold);text-transform:uppercase;}
.stms{font-size:10px;color:rgba(255,255,255,.4);font-family:‘Oswald’,sans-serif;}
.st{width:100%;border-collapse:collapse;}
.st thead tr{background:#0a1628;}
.st thead th{font-family:‘Oswald’,sans-serif;font-size:10px;font-weight:600;letter-spacing:.8px;color:rgba(255,255,255,.55);text-transform:uppercase;padding:5px;text-align:center;}
.st thead th.stt{text-align:left;padding-left:10px;min-width:110px;}
.st tbody tr{border-bottom:1px solid var(–line);}
.st tbody tr:last-child{border-bottom:none;}
.st td{padding:6px 5px;text-align:center;font-size:12px;}
.st td.rk{width:22px;padding-left:8px;font-family:‘Oswald’,sans-serif;font-weight:700;font-size:13px;color:var(–muted);}
.st td.rk.r1{color:var(–q1);}
.st td.rk.r2{color:var(–q2);}
.st td.tn{text-align:left;padding-left:6px;font-size:12px;font-weight:500;}
.st td.pts{font-family:‘Oswald’,sans-serif;font-weight:700;font-size:15px;color:#f5a623;padding-right:8px;}
.st td.df{font-weight:600;}
.st td.df.p{color:var(–pitch);}
.st td.df.n{color:var(–danger);}
.st tbody tr.q1{background:var(–q1-bg);}
.st tbody tr.q2{background:var(–q2-bg);}
.qdot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;vertical-align:middle;}
.qdot.d1{background:var(–q1);}
.qdot.d2{background:var(–q2);}
.leg{display:flex;flex-wrap:wrap;gap:14px;margin-top:14px;padding:10px 14px;background:#162030;border:1px solid #1e3048;font-size:11px;color:var(–muted);}
.leg span{display:flex;align-items:center;gap:5px;}
.lsw{display:inline-block;width:13px;height:10px;border-radius:1px;}

/* ══ PRONOSTICS ══ */
/* Profil banner */
#prono-profile{background:#0a0f1a;border-radius:6px;padding:20px;margin-bottom:20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
#prono-profile .avatar{width:48px;height:48px;border-radius:50%;background:var(–gold);display:flex;align-items:center;justify-content:center;font-family:‘Oswald’,sans-serif;font-weight:700;font-size:20px;color:var(–ink);flex-shrink:0;}
#prono-profile .info{flex:1;}
#prono-profile .name{font-family:‘Oswald’,sans-serif;font-weight:700;font-size:18px;color:#fff;}
#prono-profile .sub{font-size:11px;color:rgba(255,255,255,.45);margin-top:2px;}
#prono-login{background:#162030;border:2px dashed #1e3048;border-radius:6px;padding:28px;text-align:center;margin-bottom:20px;}
#prono-login h3{font-family:‘Oswald’,sans-serif;font-size:18px;margin-bottom:6px;}
#prono-login p{font-size:12px;color:var(–muted);margin-bottom:16px;}
.login-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
#pseudo-input{height:36px;padding:0 12px;border:1.5px solid #1e3048;border-radius:2px;font-family:‘Oswald’,sans-serif;font-size:14px;outline:none;width:200px;background:#0d1520;color:#c8d6e8;}
#pseudo-input:focus{border-color:var(–pitch);}

/* Points badge */
.pts-badge{display:inline-flex;align-items:center;gap:4px;background:var(–gold);color:var(–ink);font-family:‘Oswald’,sans-serif;font-weight:700;font-size:11px;padding:2px 7px;border-radius:10px;}
.pts-badge.exact{background:#22c55e;color:#fff;}
.pts-badge.bon{background:#f59e0b;color:#fff;}
.pts-badge.nul{background:#e5e7eb;color:#666;}

/* Prono inputs */
.pi{width:30px;height:24px;text-align:center;border:1.5px solid #1e3048;border-radius:1px;font-family:‘Oswald’,sans-serif;font-size:13px;font-weight:700;color:#c8d6e8;background:#0d1520;outline:none;}
.pi:focus{border-color:var(–pitch);}
.pi.has{border-color:#f59e0b;background:#fffbeb;}
.pi.locked{background:#f3f4f6;color:#9ca3af;border-color:#e5e7eb;pointer-events:none;}
.match-result{font-family:‘Oswald’,sans-serif;font-weight:700;font-size:13px;color:var(–pitch);}
.result-exact{color:#16a34a;}
.result-bon{color:#d97706;}
.result-nul{color:#9ca3af;}

/* LEADERBOARD */
#leaderboard{margin-top:10px;}
.lb-card{background:#162030;border:1px solid #1e3048;border-radius:4px;overflow:hidden;}
.lb-head{background:#0a0f1a;padding:12px 16px;display:flex;align-items:center;gap:10px;}
.lb-title{font-family:‘Oswald’,sans-serif;font-weight:700;font-size:17px;color:var(–gold);letter-spacing:1px;text-transform:uppercase;}
.lb-sub{font-size:11px;color:rgba(255,255,255,.4);}
.lb-table{width:100%;border-collapse:collapse;}
.lb-table thead tr{background:#0a1628;}
.lb-table thead th{font-family:‘Oswald’,sans-serif;font-size:10px;font-weight:600;letter-spacing:.8px;color:rgba(255,255,255,.55);text-transform:uppercase;padding:6px 10px;text-align:center;}
.lb-table thead th.lft{text-align:left;}
.lb-table tbody tr{border-bottom:1px solid var(–line);transition:background .15s;}
.lb-table tbody tr:last-child{border-bottom:none;}
.lb-table tbody tr.me{background:#1a2a10;}
.lb-table td{padding:10px;text-align:center;font-size:13px;}
.lb-table td.lft{text-align:left;}
.rank-num{font-family:‘Oswald’,sans-serif;font-weight:700;font-size:16px;}
.rank-num.gold{color:#d97706;}
.rank-num.silver{color:#6b7280;}
.rank-num.bronze{color:#92400e;}
.player-name{font-weight:600;font-size:14px;}
.player-name.me-name{color:var(–pitch);}
.pts-total{font-family:‘Oswald’,sans-serif;font-weight:700;font-size:18px;color:#f5a623;}
.pts-detail{font-size:10px;color:var(–muted);margin-top:1px;}
.trophy{font-size:18px;}
.rules-box{background:#162030;border:1px solid var(–line);border-radius:4px;padding:16px;margin-bottom:16px;}
.rules-box h4{font-family:‘Oswald’,sans-serif;font-size:14px;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;color:#c8d6e8;}
.rules-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;}
.rule-item{text-align:center;padding:10px;background:#0d1520;border-radius:3px;border:1px solid var(–line);}
.rule-pts{font-family:‘Oswald’,sans-serif;font-weight:700;font-size:22px;color:var(–gold);}
.rule-label{font-size:11px;color:var(–muted);margin-top:2px;}

footer{text-align:center;padding:14px;font-size:11px;color:#6b82a0;border-top:1px solid #1e3048;background:#162030;margin-top:40px;}

@media(max-width:700px){
#hdr{padding:0 10px;flex-wrap:wrap;}
.brand{border-right:none;padding-right:0;}
nav{width:100%;overflow-x:auto;border-top:1px solid rgba(255,255,255,.08);}
.tab{padding:0 10px;font-size:10px;}
.view{padding:12px;}
.sg{grid-template-columns:1fr;}
input[type=text].ti,input[type=text].qi{width:80px;}
.login-row{flex-direction:column;align-items:center;}
}
</style>

</head>

// SCORING PRONOSTICS
// ═══════════════════════════════════════
// 5 pts = score exact, 2 pts = bon résultat (V/N/D), 0 = faux
function scoreProno(prono, real){
  if(!prono||prono.s1===''||prono.s2==='')return null;
  if(!real||real.s1===''||real.s2==='')return null;
  const p1=parseInt(prono.s1),p2=parseInt(prono.s2);
  const r1=parseInt(real.s1),r2=parseInt(real.s2);
  if(isNaN(p1)||isNaN(p2)||isNaN(r1)||isNaN(r2))return null;
  if(p1===r1&&p2===r2)return{pts:5,type:'exact'};
  const res=n=>n>0?1:n<0?-1:0;
  if(res(p1-p2)===res(r1-r2))return{pts:2,type:'bon'};
  return{pts:0,type:'nul'};
}

function calcPlayerScore(pseudo){
  let total=0,exact=0,bon=0,nul=0,pending=0;
  ALL_MATCHES.forEach(m=>{
    const mid=matchId(m);
    const prono=P[pseudo]?.[mid];
    const real=S[mid];
    const sc=scoreProno(prono,real);
    if(sc===null){if(prono)pending++;return;}
    total+=sc.pts;
    if(sc.type==='exact')exact++;
    else if(sc.type==='bon')bon++;
    else nul++;
  });
  return{total,exact,bon,nul,pending};
}

function computeGrp(gid){
  const st={};GRP[gid].forEach(t=>st[t]={j:0,v:0,n:0,d:0,gf:0,ga:0,pts:0});
  (GMR[gid]||[]).forEach((m,mi)=>{
    const sc=S[gk(gid,mi)];
    if(!sc||sc.s1===''||sc.s2==='')return;
    const g1=parseInt(sc.s1),g2=parseInt(sc.s2);
    if(isNaN(g1)||isNaN(g2))return;
    const find=n=>st[n]!==undefined?n:Object.keys(st).find(k=>k.toLowerCase()===n.toLowerCase());
    const k1=find(m.t1),k2=find(m.t2);
    if(!k1||!k2)return;
    st[k1].j++;st[k1].gf+=g1;st[k1].ga+=g2;
    st[k2].j++;st[k2].gf+=g2;st[k2].ga+=g1;
    if(g1>g2){st[k1].v++;st[k1].pts+=3;st[k2].d++;}
    else if(g1<g2){st[k2].v++;st[k2].pts+=3;st[k1].d++;}
    else{st[k1].n++;st[k1].pts++;st[k2].n++;st[k2].pts++;}
  });
  return Object.entries(st).map(([name,s])=>({name,...s,diff:s.gf-s.ga}))
    .sort((a,b)=>b.pts-a.pts||b.diff-a.diff||b.gf-a.gf||a.name.localeCompare(b.name));
}

function renderStd(){
  let h=`<div class="sg">`;
  Object.keys(GRP).forEach(gid=>{
    const rows=computeGrp(gid);
    h+=`<div class="sc"><div class="schd"><span class="sgl">Groupe ${gid}</span><span class="stms">${GRP[gid].join(' · ')}</span></div>
    <table class="st"><thead><tr><th></th><th class="stt">Équipe</th><th>J</th><th>V</th><th>N</th><th>D</th><th>+</th><th>−</th><th>Diff</th><th>PTS</th></tr></thead><tbody>`;
    rows.forEach((r,i)=>{
      const qc=i===0?'q1':i===1?'q2':'';const rc=i===0?'r1':i===1?'r2':'';
      const badge=i===0?'<span class="qdot d1"></span>':i===1?'<span class="qdot d2"></span>':'';
      const dc=r.diff>0?'p':r.diff<0?'n':'';
      const ds=r.j>0?(r.diff>0?`+${r.diff}`:`${r.diff}`):'—';
      h+=`<tr class="${qc}"><td class="rk ${rc}">${i+1}</td><td class="tn">${badge}${r.name}</td>
        <td>${r.j}</td><td>${r.v}</td><td>${r.n}</td><td>${r.d}</td>
        <td>${r.gf}</td><td>${r.ga}</td><td class="df ${dc}">${ds}</td><td class="pts">${r.pts}</td></tr>`;
    });
    h+=`</tbody></table></div>`;
  });
  h+=`</div><div class="leg" style="margin-top:14px">
    <span><span class="qdot d1"></span>1er qualifié</span>
    <span><span class="qdot d2"></span>2e qualifié</span>
    <span>Départage : points → diff. buts → buts marqués</span>
  </div>`;
  document.getElementById('v-std').innerHTML=h;
}

        const cls=sc.type==='exact'?'result-exact':sc.type==='bon'?'result-bon':'result-nul';
        const icon=sc.type==='exact'?'🎯':sc.type==='bon'?'✓':'✗';
        ptsHtml=`<span class="match-result ${cls}">${icon} ${sc.pts}pts</span>`;
      }
      const fr=m.fr?'fr':'';
      h+=`<tr class="${fr}"><td>${m.h}</td>
        <td class="nc">${m.t1}</td>
        <td><input class="pi${prono.s1!==''?' has':''}${locked?' locked':''}" type="number" min="0" max="30" value="${prono.s1}" placeholder="–"
          ${locked?'disabled':''} oninput="upP('${mid}',0,this)"></td>
        <td><span class="ssep">:</span></td>
        <td><input class="pi${prono.s2!==''?' has':''}${locked?' locked':''}" type="number" min="0" max="30" value="${prono.s2}" placeholder="–"
          ${locked?'disabled':''} oninput="upP('${mid}',1,this)"></td>
        <td class="nc">${m.t2}</td>
        <td>${resultHtml}</td>
        <td>${ptsHtml}</td>
      </tr>`;
    });
    h+=`</tbody></table>`;
  });
  el.innerHTML=h;
}

// ═══════════════════════════════════════
// RENDER LEADERBOARD
// ═══════════════════════════════════════
function renderLdb(){
  const el=document.getElementById('v-ldb');
  const players=Object.keys(P);
  if(players.length===0){
    el.innerHTML=`<div style="text-align:center;padding:60px 20px;color:var(--muted);">
      <div style="font-size:48px;margin-bottom:12px">🎯</div>
      <div style="font-family:'Oswald',sans-serif;font-size:18px;margin-bottom:6px">Aucun pronostic pour l'instant</div>
      <div style="font-size:12px">Va dans l'onglet Pronostics pour commencer !</div>
    </div>`;
    return;
  }
  const ranked=players.map(p=>{const s=calcPlayerScore(p);return{pseudo:p,...s};})
    .sort((a,b)=>b.total-a.total||b.exact-a.exact||b.bon-a.bon);

  const totalMatches=ALL_MATCHES.length;
  const played=ALL_MATCHES.filter(m=>{const sc=S[matchId(m)];return sc&&sc.s1!=='';}).length;

  let h=`
  <div class="rules-box" style="margin-bottom:16px">
    <h4>📊 Avancement du tournoi</h4>
    <div style="display:flex;gap:20px;flex-wrap:wrap;font-size:13px;">
      <span>Matchs joués : <b>${played}/${totalMatches}</b></span>
      <span>Participants : <b>${players.length}</b></span>
      <span>🥇 Score exact = <b>5 pts</b> · ✓ Bon résultat = <b>2 pts</b></span>
    </div>
  </div>
  <div class="lb-card">
    <div class="lb-head">
      <span class="lb-title">🏅 Classement général</span>
      <span class="lb-sub">${ranked.length} participant${ranked.length>1?'s':''}</span>
    </div>
    <table class="lb-table">
      <thead><tr>
        <th style="width:40px">#</th>
        <th class="lft">Joueur</th>
        <th>Total</th>
        <th>🎯 Exacts</th>
        <th>✓ Bons</th>
        <th>En attente</th>
      </tr></thead><tbody>`;

  ranked.forEach((p,i)=>{
    const isMe=p.pseudo===ME;
    const medals=['🥇','🥈','🥉'];
    const trophy=medals[i]||'';
    const rankCls=i===0?'gold':i===1?'silver':i===2?'bronze':'';
    h+=`<tr class="${isMe?'me':''}">
      <td><span class="rank-num ${rankCls}">${trophy||i+1}</span></td>
      <td class="lft"><span class="player-name ${isMe?'me-name':''}">${p.pseudo}${isMe?' (moi)':''}</span></td>
      <td><span class="pts-total">${p.total}</span><div class="pts-detail">points</div></td>
      <td><b style="color:#16a34a">${p.exact}</b></td>
      <td><b style="color:#d97706">${p.bon}</b></td>
      <td style="color:var(--muted)">${p.pending}</td>
    </tr>`;
  });
  h+=`</tbody></table></div>`;
  el.innerHTML=h;
}

// ═══════════════════════════════════════
// HANDLERS
// ═══════════════════════════════════════
window.upG=function(g,idx,side,el){
  const key=gk(g,idx);if(!S[key])S[key]={s1:'',s2:''};
  side===0?S[key].s1=el.value:S[key].s2=el.value;
  el.classList.toggle('has',el.value!=='');scheduleSave();
};
window.upK=function(si,di,mi,field,el){
  const key=kk(si,di,mi);if(!S[key])S[key]={t1:'',t2:'',s1:'',s2:'',q:''};
  S[key][field]=el.value;el.classList.toggle('has',el.value!=='');scheduleSave();
};
window.upP=async function(mid,side,el){
  if(!ME)return;
  if(!P[ME])P[ME]={};
  if(!P[ME][mid])P[ME][mid]={s1:'',s2:''};
  side===0?P[ME][mid].s1=el.value:P[ME][mid].s2=el.value;
  el.classList.toggle('has',el.value!=='');
  try{
    await update(ref(db,`pronostics/${ME}/${mid}`),P[ME][mid]);
    if(document.getElementById('v-ldb').classList.contains('on'))renderLdb();
  }catch(e){console.error(e);}
};
window.setPseudo=async function(){
  const v=document.getElementById('pseudo-input').value.trim();
  if(!v)return;
  ME=v;localStorage.setItem('cdm2026_pseudo',ME);
  renderPro();
};
window.changePseudo=function(){
  ME='';localStorage.removeItem('cdm2026_pseudo');renderPro();
};
window.resetScores=async function(){
  if(!confirm('Effacer tous les scores officiels ?'))return;
  S={};try{await remove(scoresRef);renderCal();}catch(e){}
};
window.show=function(name,btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.getElementById('v-'+name).classList.add('on');
  btn.classList.add('on');
  if(name==='std')renderStd();
  else if(name==='pro')renderPro();
  else if(name==='ldb')renderLdb();
};

renderCal();
</script>
